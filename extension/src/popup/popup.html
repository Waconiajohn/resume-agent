<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerIQ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      min-height: 200px;
      background: #0D0D14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    #app {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-logo {
      font-size: 20px;
      color: #00E5CC;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .status-value {
      font-size: 13px;
      color: #ccc;
    }

    .status-value.ready {
      color: #00E5CC;
    }

    .status-value.warn {
      color: #FFB800;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: rgba(0, 229, 204, 0.12);
      border: 1px solid rgba(0, 229, 204, 0.3);
      border-radius: 8px;
      color: #00E5CC;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: rgba(0, 229, 204, 0.2);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
      color: #888;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ccc;
    }

    .loading {
      text-align: center;
      color: #555;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Loading...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
