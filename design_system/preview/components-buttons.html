<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:18px 24px">
  <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
    <button style="font-family:var(--fst-font-sans);font-weight:600;font-size:15px;background:#003147;color:#fcf9f5;border:0;padding:12px 22px;border-radius:8px;cursor:pointer">Schedule a Conversation</button>
    <button style="font-family:var(--fst-font-sans);font-weight:600;font-size:15px;background:transparent;color:#003147;border:1px solid #003147;padding:12px 22px;border-radius:8px;cursor:pointer">See Our Methodology</button>
    <button style="font-family:var(--fst-font-sans);font-weight:600;font-size:13px;background:transparent;color:#1f292e;border:0;padding:10px 14px;cursor:pointer;text-decoration:underline;text-underline-offset:3px">Read our reviews →</button>
  </div>
  <div style="font-family:var(--fst-font-mono);font-size:10px;color:var(--fst-muted);margin-top:12px">Primary · Secondary · Text/link — radius 8 · padding 12×22</div>
</div></body></html>
