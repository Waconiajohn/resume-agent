<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:18px 24px">
  <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:4px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:8px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:16px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:24px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">24</div></div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:48px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:64px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">64</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:96px;height:28px;background:#003147"></div><div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">96 · sections</div></div>
  </div>
  <div style="font-family:var(--fst-font-mono);font-size:10px;color:var(--fst-muted);margin-top:10px">8-pt scale · section rhythm 96–128</div>
</div></body></html>
