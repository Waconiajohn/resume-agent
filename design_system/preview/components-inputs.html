<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:18px 24px">
  <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
    <label style="display:flex;flex-direction:column;gap:6px;font-family:var(--fst-font-sans);font-size:13px;color:#394b52;flex:1;min-width:180px">Work email
      <input placeholder="you@company.com" style="font-family:var(--fst-font-sans);font-size:15px;padding:12px 14px;border:1px solid #e5e2db;border-radius:8px;background:#fff;color:#1f292e;outline:none"/>
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;font-family:var(--fst-font-sans);font-size:13px;color:#394b52;flex:1;min-width:180px">Company size
      <select style="font-family:var(--fst-font-sans);font-size:15px;padding:12px 14px;border:1px solid #e5e2db;border-radius:8px;background:#fff;color:#1f292e">
        <option>51–200</option><option>200–1000</option><option>1000+</option>
      </select>
    </label>
  </div>
  <div style="font-family:var(--fst-font-mono);font-size:10px;color:var(--fst-muted);margin-top:10px">Inputs · 12×14 · 8px radius · warm hairline border</div>
</div></body></html>
