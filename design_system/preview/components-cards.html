<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:16px 24px">
  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div style="flex:1;min-width:180px;background:#fff;border:1px solid #e5e2db;border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(17,17,16,0.04)">
      <div style="font-family:'Bree Serif',serif;font-size:18px;color:#111110">Positive Decline Refunds</div>
      <div style="font-family:var(--fst-font-sans);font-size:13px;line-height:1.55;color:#394b52;margin-top:6px">If a participant declines services, you get a refund.</div>
    </div>
    <div style="flex:1;min-width:180px;background:#f7f3ed;border:1px solid #e5e2db;border-radius:16px;padding:20px">
      <div style="font-family:var(--fst-font-sans);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:#394b52">Proof point</div>
      <div style="font-family:var(--fst-font-display);font-size:32px;font-weight:500;color:#111110;letter-spacing:-0.02em;margin-top:4px">100K+</div>
      <div style="font-family:var(--fst-font-sans);font-size:13px;color:#394b52">Jobseekers placed</div>
    </div>
  </div>
  <div style="font-family:var(--fst-font-mono);font-size:10px;color:var(--fst-muted);margin-top:10px">Card (surface) · Stat card (bg-alt) · 16px radius</div>
</div></body></html>
