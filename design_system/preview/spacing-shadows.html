<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:18px 24px">
  <div style="display:flex;gap:18px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e2db;border-radius:16px;box-shadow:0 1px 2px rgba(17,17,16,0.04),0 1px 1px rgba(17,17,16,0.03)"></div>
      <div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">sm</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e2db;border-radius:16px;box-shadow:0 2px 8px rgba(17,17,16,0.06),0 1px 2px rgba(17,17,16,0.04)"></div>
      <div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">base</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e2db;border-radius:16px;box-shadow:0 8px 24px rgba(17,17,16,0.08),0 2px 6px rgba(17,17,16,0.04)"></div>
      <div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">md (hover)</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e2db;border-radius:16px;box-shadow:0 24px 48px rgba(17,17,16,0.12),0 8px 16px rgba(17,17,16,0.06)"></div>
      <div style="font-family:var(--fst-font-mono);font-size:10px;color:#394b52">lg</div>
    </div>
  </div>
</div></body></html>
