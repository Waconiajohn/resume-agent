/* -------- WEBFONTS ------------------------------------------------------ */
/* Primary stack pulled from the shipped site. Local woff2 files in /fonts/. */

@font-face {
  font-family: "Playfair Display";
  font-style: normal;
  font-weight: 400 900;
  font-display: swap;
  src: url("./fonts/PlayfairDisplay-latin.woff2") format("woff2");
}
@font-face {
  font-family: "Bree Serif";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("./fonts/BreeSerif-latin.woff2") format("woff2");
}
@font-face {
  font-family: "Inter";
  font-style: normal;
  font-weight: 100 900;
  font-display: swap;
  src: url("./fonts/Inter-latin.woff2") format("woff2");
}
@font-face {
  font-family: "IBM Plex Mono";
  font-style: normal;
  font-weight: 400 700;
  font-display: swap;
  src: url("./fonts/IBMPlexMono-latin.woff2") format("woff2");
}
/* Fallback metric-matched families, mirrors site @font-face aliases */
@font-face { font-family: "Inter Fallback"; src: local(Arial);
  ascent-override: 90.44%; descent-override: 22.52%; line-gap-override: 0%; size-adjust: 107.12%; }
@font-face { font-family: "Playfair Display Fallback"; src: local("Times New Roman");
  ascent-override: 97.25%; descent-override: 22.56%; line-gap-override: 0%; size-adjust: 111.26%; }

/* -------- TOKENS -------------------------------------------------------- */
:root {
  /* Base surfaces — warm paper, not pure white */
  --fst-bg:          #fcf9f5;   /* page background (warm cream) */
  --fst-bg-alt:      #f7f3ed;   /* alternate section */
  --fst-bg-warm:     #f2ede5;   /* deeper warm band */
  --fst-surface:     #ffffff;   /* cards / elevated */
  --fst-bg-dark:     #0f1729;   /* wealth / dark hero */
  --fst-bg-wealth:   #0b1120;   /* deepest (FirstSourceWealth sibling brand) */
  --fst-surface-dark:#1e2636;

  /* Text */
  --fst-heading:     #111110;   /* near-black, warm */
  --fst-text:        #1f292e;   /* body */
  --fst-muted:       #394b52;   /* secondary */
  --fst-subtle:      #718096;   /* tertiary / meta */
  --fst-invert:      #fcf9f5;   /* text on dark surfaces */

  /* Brand accents */
  --fst-accent:          #003147;   /* deep teal/navy — primary brand accent */
  --fst-accent-deep:     #1f292e;   /* deepest ink */
  --fst-accent-muted:    #0031471f; /* accent @ 12% alpha — focus rings, tints */
  --fst-career:          #46A1EC;   /* CareerIQ / outplacement product blue */
  --fst-career-light:    #6bb5f0;
  --fst-career-dark:     #2e8ad4;
  --fst-career-bg:       #eff6fe;   /* blue-tinted surface */

  /* System / semantic */
  --fst-border:      #e5e2db;       /* warm paper divider */
  --fst-border-cool: #e2e8f0;       /* for blue/cool contexts */
  --fst-success:     #34d399;
  --fst-warn:        #fbbf24;
  --fst-danger:      #dc2626;

  /* Type families */
  --fst-font-display:  "Playfair Display", "Playfair Display Fallback", Georgia, serif;
  --fst-font-serif:    "Bree Serif", "Playfair Display", Georgia, serif;
  --fst-font-sans:     "Inter", "Inter Fallback", system-ui, -apple-system, Segoe UI, sans-serif;
  --fst-font-mono:     "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

  /* Type scale (responsive clamp from site) */
  --fst-size-display: clamp(2.5rem, 6vw, 4rem);
  --fst-size-h1:      clamp(2rem, 5vw, 3.5rem);
  --fst-size-h2:      clamp(1.75rem, 4vw, 2.5rem);
  --fst-size-h3:      1.5rem;
  --fst-size-h4:      1.25rem;
  --fst-size-body:    1.125rem;
  --fst-size-small:   0.875rem;
  --fst-size-xs:      0.75rem;
  --fst-size-mono:    1rem;

  /* Letter-spacing */
  --fst-track-display: -0.03em;
  --fst-track-body:    0;
  --fst-track-mono:    0.02em;
  --fst-track-eyebrow: 0.12em;

  /* Line-heights */
  --fst-lh-display:  1.05;
  --fst-lh-heading:  1.15;
  --fst-lh-body:     1.65;
  --fst-lh-tight:    1.25;

  /* Spacing (8-pt, soft) */
  --fst-space-1:  4px;
  --fst-space-2:  8px;
  --fst-space-3:  12px;
  --fst-space-4:  16px;
  --fst-space-5:  24px;
  --fst-space-6:  32px;
  --fst-space-7:  48px;
  --fst-space-8:  64px;
  --fst-space-9:  96px;
  --fst-space-10: 128px;

  /* Radii — restrained, never pill unless specific */
  --fst-radius-sm: 4px;
  --fst-radius:    8px;
  --fst-radius-md: 12px;
  --fst-radius-lg: 16px;
  --fst-radius-xl: 24px;
  --fst-radius-pill: 999px;

  /* Shadows — soft, warm, rarely heavy */
  --fst-shadow-sm: 0 1px 2px rgba(17,17,16,0.04), 0 1px 1px rgba(17,17,16,0.03);
  --fst-shadow:    0 2px 8px rgba(17,17,16,0.06), 0 1px 2px rgba(17,17,16,0.04);
  --fst-shadow-md: 0 8px 24px rgba(17,17,16,0.08), 0 2px 6px rgba(17,17,16,0.04);
  --fst-shadow-lg: 0 24px 48px rgba(17,17,16,0.12), 0 8px 16px rgba(17,17,16,0.06);
  --fst-shadow-inset: inset 0 1px 0 rgba(255,255,255,0.5);

  /* Motion */
  --fst-ease-standard:    cubic-bezier(.4, 0, .2, 1);
  --fst-ease-emphasized:  cubic-bezier(.2, 0, 0, 1);
  --fst-ease-decelerate:  cubic-bezier(0, 0, .2, 1);
  --fst-ease-organic:     cubic-bezier(.25, .1, .25, 1);
  --fst-dur-fast:    0.3s;
  --fst-dur-normal:  0.5s;
  --fst-dur-slow:    0.8s;
  --fst-dur-premium: 1.2s;
}

/* -------- SEMANTIC ELEMENT STYLES ---------------------------------------- */

html, body {
  background: var(--fst-bg);
  color: var(--fst-text);
  font-family: var(--fst-font-sans);
  font-size: var(--fst-size-body);
  line-height: var(--fst-lh-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Headings use Playfair Display for editorial weight — the marketing signature */
h1, h2, h3, h4, h5, h6,
.fst-h1, .fst-h2, .fst-h3, .fst-h4 {
  font-family: var(--fst-font-display);
  color: var(--fst-heading);
  line-height: var(--fst-lh-heading);
  letter-spacing: var(--fst-track-display);
  font-weight: 500;
  text-wrap: balance;
  margin: 0;
}

.fst-display, h1 {
  font-size: var(--fst-size-display);
  line-height: var(--fst-lh-display);
  font-weight: 500;
}
h2, .fst-h2 { font-size: var(--fst-size-h2); font-weight: 500; }
h3, .fst-h3 { font-size: var(--fst-size-h3); font-weight: 500; }
h4, .fst-h4 { font-size: var(--fst-size-h4); font-weight: 600; }

/* Bree Serif is the secondary display / feature callout (bento titles, callouts) */
.fst-callout {
  font-family: var(--fst-font-serif);
  font-weight: 400;
  color: var(--fst-heading);
  letter-spacing: -0.005em;
}

/* Eyebrows — the little kicker labels above section headings */
.fst-eyebrow {
  font-family: var(--fst-font-sans);
  font-size: var(--fst-size-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: var(--fst-track-eyebrow);
  color: var(--fst-muted);
}

/* Body */
p, .fst-p {
  font-family: var(--fst-font-sans);
  font-size: var(--fst-size-body);
  line-height: var(--fst-lh-body);
  color: var(--fst-text);
  text-wrap: pretty;
  margin: 0;
}

.fst-lead {
  font-size: 1.25rem;
  line-height: 1.55;
  color: var(--fst-muted);
}

small, .fst-small {
  font-size: var(--fst-size-small);
  color: var(--fst-muted);
}

code, pre, .fst-mono {
  font-family: var(--fst-font-mono);
  font-size: var(--fst-size-mono);
  letter-spacing: var(--fst-track-mono);
}

/* Editorial blockquotes — review callouts use large Playfair */
blockquote, .fst-quote {
  font-family: var(--fst-font-display);
  font-size: clamp(1.5rem, 3vw, 2rem);
  line-height: 1.35;
  color: var(--fst-heading);
  font-style: italic;
  font-weight: 400;
  margin: 0;
}

/* Links */
a, .fst-link {
  color: var(--fst-accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  transition: color var(--fst-dur-fast) var(--fst-ease-standard),
              text-decoration-color var(--fst-dur-fast) var(--fst-ease-standard);
}
a:hover { color: var(--fst-career); }

/* Selection */
::selection { background: var(--fst-accent); color: var(--fst-bg); }

</style>

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (

      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>

          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>

}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',

      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,

  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
