# NOTE: Branch protection rules should require all CI checks to pass before merging.
# In GitHub Settings → Branches → Branch protection rules, enable:
#   "Require status checks to pass before merging" and add:
#   app-verify, server-verify, migration-drift, secrets-scan
name: Production Gates

on:
  pull_request:
    paths:
      - 'app/**'
      - 'server/**'
      - 'supabase/migrations/**'
      - '.github/workflows/production-gates.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'server/**'
      - 'supabase/migrations/**'
      - '.github/workflows/production-gates.yml'
  workflow_dispatch:
    inputs:
      ready_check_url:
        description: 'Optional staging API base URL. If set, runs /ready gate.'
        required: false
        type: string
      real_qa_session_ids:
        description: 'Optional comma-separated real session IDs for resume preservation QA.'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-verify:
    name: App Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Verify app
        run: npm run verify
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

  server-verify:
    name: Server Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Verify server
        run: npm run verify

      - name: Run tests
        run: npx vitest run

  migration-drift:
    name: Migration Drift Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Install dependencies
        run: npm ci

      - name: Check migration drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::warning::Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF — skipping migration drift check."
            exit 0
          fi
          npm run check:migrations || {
            echo "::warning::Migration drift check failed (possibly expired token). Review manually."
            exit 0
          }

  staging-ready:
    name: Staging Ready Gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.ready_check_url != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe staging /ready
        env:
          READY_CHECK_URL: ${{ inputs.ready_check_url }}
          READY_CHECK_TIMEOUT_MS: '90000'
          READY_CHECK_INTERVAL_MS: '1500'
        run: node scripts/check-ready.mjs

  resume-preservation-qa:
    name: Resume Preservation QA
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.real_qa_session_ids != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    env:
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run real-session preservation QA
        env:
          REAL_QA_SESSION_IDS: ${{ inputs.real_qa_session_ids }}
        run: npm run qa:real

      - name: Upload real-session QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resume-preservation-qa
          path: test-results/real-session-quality/
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build app
        working-directory: app
        run: npm run build

      - name: Start app preview
        working-directory: app
        run: npx vite preview --port 5173 &

      - name: Wait for app
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "App ready"
              break
            fi
            sleep 2
          done

      - name: Smoke test - app loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173)
          if [ "$STATUS" != "200" ]; then
            echo "App returned HTTP $STATUS, expected 200"
            exit 1
          fi
          echo "App loads successfully (HTTP 200)"

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
